<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0b"/>
      <stop offset="100%" style="stop-color:#1a1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97757"/>
      <stop offset="100%" style="stop-color:#e8945e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo mark -->
  <rect x="80" y="180" width="72" height="72" rx="18" fill="#d97757"/>
  <text x="116" y="230" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="36" font-weight="900">AI</text>
  <!-- Title -->
  <text x="80" y="310" fill="#f0ece4" font-family="Inter, sans-serif" font-size="56" font-weight="800" letter-spacing="-2">AI Today Thailand</text>
  <!-- Subtitle -->
  <text x="80" y="370" fill="#a09b90" font-family="Inter, sans-serif" font-size="28" font-weight="400">ข่าว AI วันละไม่กี่นาที — สรุปเข้าใจง่าย อัปเดตทุกวัน</text>
  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" opacity="0.3"/>
  <!-- Category dots -->
  <circle cx="80" cy="460" r="6" fill="#d97757"/>
  <circle cx="104" cy="460" r="6" fill="#7c6ef0"/>
  <circle cx="128" cy="460" r="6" fill="#10b981"/>
  <circle cx="152" cy="460" r="6" fill="#8B5CF6"/>
  <circle cx="176" cy="460" r="6" fill="#ef4444"/>
  <circle cx="200" cy="460" r="6" fill="#3b82f6"/>
  <circle cx="224" cy="460" r="6" fill="#f59e0b"/>
</svg>
